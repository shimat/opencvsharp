name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      keep_beta:
        description: "Publish with the -beta suffix kept (pre-release)"
        type: boolean
        default: false
      skip_platforms:
        description: "Comma-separated platforms to skip (linux-arm64, macos, wasm, manylinux)"
        type: string
        default: ""

jobs:
  Prepare:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - name: Download windows artifact
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: windows.yml
          name: packages_windows
          branch: ${{ github.ref_name }}

      - name: Download windows arm64 artifact
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: windows.yml
          name: packages_windows_arm64
          branch: ${{ github.ref_name }}

      - name: Download ubuntu arm64 artifact
        if: ${{ !contains(inputs.skip_platforms, 'linux-arm64') }}
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: linux-arm64.yml
          name: artifacts_linux_arm64
          branch: ${{ github.ref_name }}

      - name: Download macos artifact
        if: ${{ !contains(inputs.skip_platforms, 'macos') }}
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: macos.yml
          name: nuget-packages-macos
          branch: ${{ github.ref_name }}

      - name: Download wasm artifact
        if: ${{ !contains(inputs.skip_platforms, 'wasm') }}
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: wasm.yml
          name: artifacts_wasm
          branch: ${{ github.ref_name }}

      - name: Download manylinux artifact
        if: ${{ !contains(inputs.skip_platforms, 'manylinux') }}
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: manylinux.yml
          name: nuget-packages-manylinux
          branch: ${{ github.ref_name }}

      - run: |
          ls -l

      - name: Validate expected packages exist
        env:
          SKIP_PLATFORMS: ${{ inputs.skip_platforms }}
        run: |
          set -euo pipefail

          failed=0
          check_package() {
            local pattern="$1"
            local count
            count=$(find "$PWD" -maxdepth 4 -type f -name "${pattern}" | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "MISSING: $pattern"
              failed=$((failed + 1))
            else
              echo "OK: $pattern"
            fi
          }

          skip_has() {
            case ",${SKIP_PLATFORMS}," in
              *",$1,"*) return 0 ;;
              *) return 1 ;;
            esac
          }

          check_package "OpenCvSharp5.5.*.nupkg"
          check_package "OpenCvSharp5.GdipExtensions.*.nupkg"
          check_package "OpenCvSharp5.WpfExtensions.*.nupkg"
          check_package "OpenCvSharp5.AvaloniaExtensions.*.nupkg"
          check_package "OpenCvSharp5.runtime.win.[0-9]*.nupkg"
          check_package "OpenCvSharp5.runtime.win-arm64.[0-9]*.nupkg"
          check_package "OpenCvSharp5.runtime.win-arm64.slim.*.nupkg"
          check_package "OpenCvSharp5.runtime.win.slim.*.nupkg"
          check_package "OpenCvSharp5.Windows.[0-9]*.nupkg"
          check_package "OpenCvSharp5.Windows.Slim.*.nupkg"

          if skip_has linux-arm64; then
            echo "skip_platforms: skipping linux-arm64 package checks"
          else
            check_package "OpenCvSharp5.runtime.linux-arm.*.nupkg"
            check_package "OpenCvSharp5.runtime.linux-arm64.*.nupkg"
          fi

          if skip_has wasm; then
            echo "skip_platforms: skipping wasm package checks"
          else
            check_package "OpenCvSharp5.runtime.wasm.*.nupkg"
          fi

          if skip_has manylinux; then
            echo "skip_platforms: skipping manylinux package checks"
          else
            check_package "OpenCvSharp5.official.runtime.linux-x64.[0-9]*.nupkg"
            check_package "OpenCvSharp5.official.runtime.linux-x64.headless.*.nupkg"
            check_package "OpenCvSharp5.official.runtime.linux-x64.slim.*.nupkg"
          fi

          if skip_has macos; then
            echo "skip_platforms: skipping macos package checks"
          else
            check_package "OpenCvSharp5.runtime.osx.x64.*.nupkg"
            check_package "OpenCvSharp5.runtime.osx.arm64.*.nupkg"
          fi

          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "ERROR: $failed expected package(s) not found. Detected .nupkg files:"
            find "$PWD" -maxdepth 4 -type f -name "*.nupkg" -print
            exit 1
          fi

      - name: Strip beta suffix from packages
        if: ${{ !inputs.keep_beta }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          for f in *.nupkg *.snupkg; do
            case "$f" in
              *-beta*) ;;
              *) continue ;;
            esac

            if ! [[ "$f" =~ ^OpenCvSharp5\..*[0-9]{8}-beta[0-9]*\.s?nupkg$ ]]; then
              echo "ERROR: Unexpected -beta package file name: $f"
              exit 1
            fi

            tmpdir=$(mktemp -d)
            nuspec_entry=$(unzip -Z1 "$f" | grep '\.nuspec$' || true)
            if [ -n "$nuspec_entry" ]; then
              nuspec_local="$tmpdir/$(basename "$nuspec_entry")"
              unzip -p "$f" "$nuspec_entry" > "$nuspec_local"

              # Strip -beta / -betaN from the package's own <version>
              sed -i -E 's/-beta-?[0-9]*(<\/version>)/\1/' "$nuspec_local"

              # Strip -beta / -betaN from dependency version references (meta-packages), except ubuntu/manylinux ones
              case "$f" in
                *ubuntu*) ;;
                *) sed -i -E 's/(version="[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{8})-beta-?[0-9]*/\1/g' "$nuspec_local" ;;
              esac

              # Replace the existing .nuspec entry in place without touching the rest of the archive
              zip -q -d "$f" "$nuspec_entry"
              zip -q -j "$f" "$nuspec_local"
            fi
            rm -rf "$tmpdir"

            newname=$(echo "$f" | sed -E 's/-beta-?[0-9]*//')
            mv "$f" "$newname"
          done

      - name: Verify no beta versions remain
        if: ${{ !inputs.keep_beta }}
        run: |
          if find . -maxdepth 1 -name "*-beta*" -type f | grep -q .; then
            echo "ERROR: beta packages still exist after rename"
            find . -maxdepth 1 -name "*-beta*" -type f
            exit 1
          fi

      - name: List packages to publish
        run: |
          echo "=== Packages ready for publishing ==="
          ls -lh *.nupkg *.snupkg 2>/dev/null || true

          echo "## NuGet Packages to Publish" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          for f in *.nupkg; do
            [ -f "$f" ] || continue
            size=$(numfmt --to=iec --suffix=B --format="%.2f" "$(stat -c %s "$f")")
            echo "| \`${f}\` | ${size} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total:** $(find . -maxdepth 1 -name '*.nupkg' | wc -l) nupkg, $(find . -maxdepth 1 -name '*.snupkg' | wc -l) snupkg" >> $GITHUB_STEP_SUMMARY

      - name: Upload release packages
        uses: actions/upload-artifact@v7
        with:
          name: release-packages
          path: |
            *.nupkg
            *.snupkg
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Consume the actual, about-to-be-published .nupkg files as a real PackageReference
  # (against a local feed, not a ProjectReference against source) before anything gets
  # pushed to nuget.org. Catches packaging mistakes - wrong RID asset placement, a missing
  # native library, a broken dependency graph - that the source-level "test" jobs in
  # windows.yml/manylinux.yml/macos.yml never exercise, since those only ever run against
  # loose build output with the native binary copied in by hand.
  # ---------------------------------------------------------------------------
  PackageSmokeTest:
    name: Package smoke test (${{ matrix.os }})
    needs: Prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime_package: OpenCvSharp5.Windows
          - os: ubuntu-latest
            runtime_package: OpenCvSharp5.official.runtime.linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: release-packages

      - name: Install .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Determine package version
        id: version
        shell: bash
        run: |
          file=$(ls release-packages/OpenCvSharp5.[0-9]*.nupkg | head -1)
          name=$(basename "$file")
          version=${name#OpenCvSharp5.}
          version=${version%.nupkg}
          echo "Package version under test: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Run package smoke test
        shell: bash
        env:
          SMOKE_TEST_VERSION: ${{ steps.version.outputs.version }}
          SMOKE_TEST_RUNTIME_PACKAGE: ${{ matrix.runtime_package }}
        run: |
          cd test/OpenCvSharp.PackageSmokeTest
          dotnet run -c Release \
            -p:RestoreAdditionalProjectSources="$GITHUB_WORKSPACE/release-packages" \
            -p:SmokeTestPackageVersion="$SMOKE_TEST_VERSION" \
            -p:SmokeTestRuntimePackage="$SMOKE_TEST_RUNTIME_PACKAGE"

  Publish:
    needs: [Prepare, PackageSmokeTest]
    runs-on: ubuntu-24.04
    environment: nuget-production

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          name: release-packages

      - name: List packages
        run: ls -lh *.nupkg *.snupkg 2>/dev/null || true

      - name: Push to nuget.org
        run: |
          set -euo pipefail

          pushed=0
          skipped=0
          failed=0

          push_package() {
            local file="$1"
            local name
            name=$(basename "$file")
            local output
            if output=$(dotnet nuget push "$file" \
                --skip-duplicate \
                --force-english-output \
                -k ${{secrets.NUGET_ORG_API_KEY}} \
                -s https://api.nuget.org/v3/index.json 2>&1); then
              echo "$output"
              if echo "$output" | grep -qi "already exists"; then
                echo "SKIPPED (already exists): $name"
                echo "| \`$name\` | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
                skipped=$((skipped + 1))
              else
                echo "PUSHED: $name"
                echo "| \`$name\` | ✅ Pushed |" >> $GITHUB_STEP_SUMMARY
                pushed=$((pushed + 1))
              fi
            else
              echo "FAILED: $name"
              echo "$output"
              echo "| \`$name\` | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
              failed=$((failed + 1))
            fi
          }

          echo "## Push Results" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY

          # dotnet nuget push automatically uploads the matching .snupkg when pushing a .nupkg
          # if the file exists in the same directory (nupkg is pushed first, then snupkg).
          # See: https://learn.microsoft.com/en-us/nuget/create-packages/symbol-packages-snupkg#publishing-a-symbol-package
          echo "--- Pushing .nupkg (and corresponding .snupkg automatically) ---"
          for f in *.nupkg; do
            [ -f "$f" ] || continue
            push_package "$f"
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pushed:** $pushed  **Skipped:** $skipped  **Failed:** $failed" >> $GITHUB_STEP_SUMMARY

          if [ "$failed" -gt 0 ]; then
            echo "ERROR: $failed package(s) failed to push."
            exit 1
          fi
