name: Publish NuGet

on:
  workflow_dispatch:

jobs:
  Prepare:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Download windows artifact
        uses: dawidd6/action-download-artifact@v19
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: windows.yml
          name: packages_windows
          branch: ${{ github.ref_name }}

      - name: Download windows arm64 artifact
        uses: dawidd6/action-download-artifact@v19
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: windows.yml
          name: packages_windows_arm64
          branch: ${{ github.ref_name }}

      - name: Download ubuntu arm64 artifact
        uses: dawidd6/action-download-artifact@v19
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: linux-arm64.yml
          name: artifacts_linux_arm64
          branch: ${{ github.ref_name }}

      #- name: Download macos artifact
      #  uses: dawidd6/action-download-artifact@v19
      #  with:
      #    github_token: ${{secrets.GITHUB_TOKEN}}
      #    workflow: macos10.yml
      #    name: artifacts_macos_10
      #    branch: ${{ github.ref_name }}

      - name: Download wasm artifact
        uses: dawidd6/action-download-artifact@v19
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: wasm.yml
          name: artifacts_wasm
          branch: ${{ github.ref_name }}

      - name: Download manylinux artifact
        uses: dawidd6/action-download-artifact@v19
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: manylinux.yml
          name: nuget-packages-manylinux
          branch: ${{ github.ref_name }}

      - run: |
          ls -l

      - name: Validate expected packages exist
        run: |
          set -euo pipefail

          failed=0
          check_package() {
            local pattern="$1"
            local count
            count=$(find "$PWD" -maxdepth 4 -type f -name "${pattern}" | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "MISSING: $pattern"
              failed=$((failed + 1))
            else
              echo "OK: $pattern"
            fi
          }

          check_package "OpenCvSharp4.4.*.nupkg"
          check_package "OpenCvSharp4.Extensions.*.nupkg"
          check_package "OpenCvSharp4.WpfExtensions.*.nupkg"
          check_package "OpenCvSharp4.runtime.win.[0-9]*.nupkg"
          check_package "OpenCvSharp4.runtime.win-arm64.[0-9]*.nupkg"
          check_package "OpenCvSharp4.runtime.win-arm64.slim.*.nupkg"
          check_package "OpenCvSharp4.runtime.win.slim.*.nupkg"
          check_package "OpenCvSharp4.Windows.[0-9]*.nupkg"
          check_package "OpenCvSharp4.Windows.Slim.*.nupkg"
          check_package "OpenCvSharp4.runtime.linux-arm.*.nupkg"
          check_package "OpenCvSharp4.runtime.linux-arm64.*.nupkg"
          check_package "OpenCvSharp4.runtime.wasm.*.nupkg"
          check_package "OpenCvSharp4.official.runtime.linux-x64.[0-9]*.nupkg"
          check_package "OpenCvSharp4.official.runtime.linux-x64.slim.*.nupkg"

          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "ERROR: $failed expected package(s) not found. Detected .nupkg files:"
            find "$PWD" -maxdepth 4 -type f -name "*.nupkg" -print
            exit 1
          fi

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Rename
        run: |
          for f in $(find $PWD -maxdepth 1 -regex ".+\.s?nupkg"); do
            dotnet run --project src/tools/OpenCvSharp.NupkgBetaRemover --configuration Release -- "$f"
          done

      - name: Verify no beta versions remain
        run: |
          if find . -maxdepth 1 -name "*-beta*" -type f | grep -q .; then
            echo "ERROR: beta packages still exist after rename"
            find . -maxdepth 1 -name "*-beta*" -type f
            exit 1
          fi

      - name: List packages to publish
        run: |
          echo "=== Packages ready for publishing ==="
          ls -lh *.nupkg *.snupkg 2>/dev/null || true

          echo "## NuGet Packages to Publish" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          for f in *.nupkg; do
            [ -f "$f" ] || continue
            size=$(numfmt --to=iec --suffix=B --format="%.2f" "$(stat -c %s "$f")")
            echo "| \`${f}\` | ${size} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total:** $(find . -maxdepth 1 -name '*.nupkg' | wc -l) nupkg, $(find . -maxdepth 1 -name '*.snupkg' | wc -l) snupkg" >> $GITHUB_STEP_SUMMARY

      - name: Upload release packages
        uses: actions/upload-artifact@v6
        with:
          name: release-packages
          path: |
            *.nupkg
            *.snupkg
          retention-days: 7

  Publish:
    needs: Prepare
    runs-on: ubuntu-24.04
    environment: nuget-production

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v6
        with:
          name: release-packages

      - name: List packages
        run: ls -lh *.nupkg *.snupkg 2>/dev/null || true

      - name: Push to nuget.org
        run: |
          set -euo pipefail

          pushed=0
          skipped=0
          failed=0

          push_package() {
            local file="$1"
            local name
            name=$(basename "$file")
            local output
            if output=$(dotnet nuget push "$file" \
                --skip-duplicate \
                --force-english-output \
                -k ${{secrets.NUGET_ORG_API_KEY}} \
                -s https://api.nuget.org/v3/index.json 2>&1); then
              echo "$output"
              if echo "$output" | grep -qi "already exists"; then
                echo "SKIPPED (already exists): $name"
                echo "| \`$name\` | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
                skipped=$((skipped + 1))
              else
                echo "PUSHED: $name"
                echo "| \`$name\` | ✅ Pushed |" >> $GITHUB_STEP_SUMMARY
                pushed=$((pushed + 1))
              fi
            else
              echo "FAILED: $name"
              echo "$output"
              echo "| \`$name\` | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
              failed=$((failed + 1))
            fi
          }

          echo "## Push Results" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY

          # dotnet nuget push automatically uploads the matching .snupkg when pushing a .nupkg
          # if the file exists in the same directory (nupkg is pushed first, then snupkg).
          # See: https://learn.microsoft.com/en-us/nuget/create-packages/symbol-packages-snupkg#publishing-a-symbol-package
          echo "--- Pushing .nupkg (and corresponding .snupkg automatically) ---"
          for f in *.nupkg; do
            [ -f "$f" ] || continue
            push_package "$f"
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pushed:** $pushed  **Skipped:** $skipped  **Failed:** $failed" >> $GITHUB_STEP_SUMMARY

          if [ "$failed" -gt 0 ]; then
            echo "ERROR: $failed package(s) failed to push."
            exit 1
          fi
